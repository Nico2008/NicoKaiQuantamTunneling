<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinematic Quantum Tunneling - Perfect Superposition</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<style>
  :root {
    --bg-main: #06090e;
    --bg-panel: #0d131c;
    --border: #1a2636;
    --text-main: #7a93b3;
    --text-light: #dce6f2;
    --accent-blue: #2eb6ff;
    --accent-green: #2eff84;
    --accent-orange: #ff842e;
    --accent-purple: #c47aff;
  }
  body { margin: 0; padding: 20px; background: #030406; display: flex; justify-content: center; font-family: system-ui, -apple-system, sans-serif; user-select: none; }
  
  #qt-wrap { 
    background: var(--bg-main); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); 
    box-shadow: 0 25px 60px rgba(0,0,0,0.9); width: 100%; max-width: 900px;
  }
  
  #qt-header { background: var(--bg-panel); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  #qt-header .title { color: var(--text-light); font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 10px; letter-spacing: 0.5px; }
  #qt-header .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent-purple); box-shadow: 0 0 12px var(--accent-purple); animation: pulse 2s infinite; }
  @keyframes pulse { 0% { opacity: 0.5; box-shadow: 0 0 5px var(--accent-purple); } 50% { opacity: 1; box-shadow: 0 0 15px var(--accent-purple); } 100% { opacity: 0.5; box-shadow: 0 0 5px var(--accent-purple); } }

  .version-tag { color: #a5b9ce; font-size: 12px; font-family: monospace; font-weight: bold; background: #162130; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); }

  #qt-tabs { display: flex; gap: 8px; background: #080c12; padding: 4px; border-radius: 8px; border: 1px solid var(--border); }
  .tab-btn { background: transparent; border: none; color: var(--text-main); font-size: 13px; padding: 6px 18px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
  .tab-btn:hover { color: var(--text-light); }
  .tab-btn.active { background: #1a283b; color: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
  
  #qt-canvas { display: block; width: 100%; height: 440px; cursor: crosshair; position: relative; }
  
  #qt-controls { background: var(--bg-panel); border-top: 1px solid var(--border); padding: 24px; display: flex; flex-wrap: wrap; gap: 24px; }
  .control-group { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 150px; }
  .control-label { color: var(--text-main); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; }
  .control-row { display: flex; align-items: center; gap: 12px; background: #06090e; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); }
  .control-val { color: var(--text-light); font-size: 14px; font-weight: 700; min-width: 35px; text-align: right; font-variant-numeric: tabular-nums; }
  
  input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; height: 4px; background: #1a283b; border-radius: 2px; outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--text-light); cursor: pointer; transition: transform 0.1s; }
  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
  
  .left-col { display: flex; flex-direction: column; gap: 16px; flex: 1.2; min-width: 260px; }
  .right-col { display: flex; flex-direction: column; gap: 16px; flex: 2; min-width: 320px; }
  
  #qt-stats { display: flex; gap: 12px; }
  .stat-card { background: #06090e; border: 1px solid var(--border); border-radius: 8px; padding: 12px; flex: 1; text-align: center; }
  .stat-val { font-size: 22px; font-weight: 700; font-family: monospace; }
  .stat-lbl { font-size: 10px; color: var(--text-main); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }
  
  .btn-row { display: flex; gap: 10px; }
  .action-btn { padding: 14px 10px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 700; transition: all 0.15s; flex: 1; text-transform: uppercase; letter-spacing: 0.5px; }
  
  .btn-fire { background: var(--accent-purple); color: #fff; box-shadow: 0 4px 15px rgba(196, 122, 255, 0.3); }
  .btn-fire:hover { filter: brightness(1.1); transform: translateY(-2px); }
  .btn-fire:active { transform: translateY(1px); box-shadow: none; }
  
  .btn-pause { background: #1a283b; color: #fff; border: 1px solid var(--border); }
  .btn-pause:hover { background: #263852; }
  .btn-pause.paused { background: var(--accent-orange); color: #fff; box-shadow: 0 0 12px rgba(255, 132, 46, 0.4); border-color: var(--accent-orange); }

  .btn-reset { background: transparent; color: var(--text-main); border: 1px solid var(--border); }
  .btn-reset:hover { background: #1a283b; color: #fff; }
</style>
</head>
<body>

<div id="qt-wrap">
  <div id="qt-header">
    <div class="title"><div class="dot"></div>Cinematic Quantum Tunneling</div>
    <div style="display:flex; align-items:center; gap: 15px;">
      <div class="version-tag">v2026.04.10 11:35 PDT</div>
      <div id="qt-tabs">
        <button class="tab-btn active" id="tabQuantum" onclick="setMode('quantum')">Quantum</button>
        <button class="tab-btn" id="tabClassical" onclick="setMode('classical')">Classical</button>
      </div>
    </div>
  </div>
  <div id="qt-canvas">
      <div id="loading-msg" style="color:#7a93b3; padding: 20px; text-align: center; font-family: monospace;">
          Initializing Simulation Graphics...
      </div>
  </div>
  <div id="qt-controls">
    <div class="left-col">
      <div class="btn-row">
        <button class="action-btn btn-fire" id="btnFire">Launch</button>
        <button class="action-btn btn-pause" id="btnPause">Pause</button>
        <button class="action-btn btn-reset" id="btnReset">Reset</button>
      </div>
      <div id="qt-stats">
        <div class="stat-card">
          <div class="stat-val" id="statT" style="color:var(--accent-green)">--</div>
          <div class="stat-lbl">Transmission</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="statR" style="color:var(--accent-orange)">--</div>
          <div class="stat-lbl">Reflection</div>
        </div>
      </div>
    </div>
    
    <div class="right-col">
      <div style="display:flex; gap: 16px;">
        <div class="control-group">
          <div class="control-label">Particle Energy (E)</div>
          <div class="control-row">
            <input type="range" id="energySlider" min="0.1" max="1.5" value="0.5" step="0.01">
            <span class="control-val" id="energyVal">0.50</span>
          </div>
        </div>
        <div class="control-group">
          <div class="control-label">Barrier Height (V₀)</div>
          <div class="control-row">
            <input type="range" id="heightSlider" min="0.3" max="2.0" value="1.0" step="0.01">
            <span class="control-val" id="heightVal">1.00</span>
          </div>
        </div>
      </div>
      <div style="display:flex; gap: 16px;">
        <div class="control-group">
          <div class="control-label">Barrier Width (a)</div>
          <div class="control-row">
            <input type="range" id="widthSlider" min="0.1" max="3.0" value="0.8" step="0.05">
            <span class="control-val" id="widthVal">0.80</span>
          </div>
        </div>
        <div class="control-group">
          <div class="control-label">Wave Spread (&sigma;)</div>
          <div class="control-row">
            <input type="range" id="spreadSlider" min="0.3" max="1.5" value="0.8" step="0.05">
            <span class="control-val" id="spreadVal">0.80</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
window.onload = function() {
    let loader = document.getElementById('loading-msg');
    if (typeof p5 === 'undefined') {
        if(loader) loader.innerHTML = "<span style='color:#ff5555; font-size:14px;'><b>CRITICAL ERROR:</b> p5.js Library Failed to Load.</span>";
    } else {
        if(loader) loader.style.display = 'none';
    }
};

let simMode = 'quantum';
function setMode(m) {
  simMode = m;
  document.getElementById('tabQuantum').className = 'tab-btn' + (m==='quantum'?' active':'');
  document.getElementById('tabClassical').className = 'tab-btn' + (m==='classical'?' active':'');
  if (typeof window.doReset === 'function') window.doReset();
}

new p5(function(p) {
  let W = 800, H = 440;
  const AXIS_Y_FRAC = 0.65;

  let E = 0.5, V0 = 1.0, barrierW = 0.8, spread = 0.8;
  let T = 0, R = 1;

  // Deterministic Timeline Engine
  let isRunning = false;
  let isPaused = false;
  let timelineProgress = 0; // Goes from 0.0 to 1.0 representing the entire launch
  let simTime = 0; // Drives wave oscillation independently of position
  
  let camX = 0, camY = 0, camScale = 1.0;
  let targetCamX = 0, targetCamY = 0, targetCamScale = 1.0;

  // Pure arrays for memory safety
  const COL_TRANS = [46, 255, 132]; // Green Exit Wave
  const COL_REFL  = [255, 132, 46]; // Orange Reflected
  const COL_INC   = [46, 182, 255]; // Blue Incident
  const COL_SUPER = [196, 122, 255]; // Purple Interference

  function calcT(E_, V0_, a_nm) {
    let a = a_nm * 8; 
    if (Math.abs(E_ - V0_) < 0.005) { return 1 / (1 + (2 * 0.038 * V0_ * a * a)); }
    if (E_ > V0_) {
      let k1 = Math.sqrt(E_), k2 = Math.sqrt(Math.max(0.0001, E_ - V0_));
      let sinSq = Math.pow(Math.sin(k2 * a), 2);
      return 1 / (1 + (Math.pow(k1*k1 - k2*k2, 2) * sinSq) / (4 * k1*k1 * k2*k2));
    } else {
      let kappa = Math.sqrt(Math.max(0.0001, V0_ - E_));
      let sinhSq = Math.pow(Math.sinh(kappa * a), 2);
      return 1 / (1 + (V0_ * V0_ * sinhSq) / (4 * E_ * (V0_ - E_)));
    }
  }

  function doReset() {
    isRunning = false;
    isPaused = false;
    timelineProgress = 0;
    simTime = 0;
    targetCamScale = 1.0; targetCamX = 0; targetCamY = 0;
    camScale = 1.0; camX = 0; camY = 0; 
    
    let btnF = document.getElementById('btnFire');
    if (btnF) { btnF.disabled = false; btnF.style.opacity = 1; btnF.textContent = "Launch"; }
    
    let btnP = document.getElementById('btnPause');
    if (btnP) { btnP.textContent = "Pause"; btnP.classList.remove('paused'); }
  }
  window.doReset = doReset;

  p.setup = function() {
    try {
        let container = document.getElementById('qt-canvas');
        if (container) { W = container.offsetWidth > 0 ? container.offsetWidth : 800; H = container.offsetHeight > 0 ? container.offsetHeight : 440; }
        let cnv = p.createCanvas(W, H);
        cnv.parent('qt-canvas');
        
        updateParams();
        
        document.getElementById('btnFire').onclick = () => { 
          if (!isRunning) { 
            isRunning = true;
            document.getElementById('btnFire').disabled = true;
            document.getElementById('btnFire').style.opacity = 0.5;
            document.getElementById('btnFire').textContent = "In Motion...";
          } 
        };
        
        document.getElementById('btnPause').onclick = () => {
            if (!isRunning) return;
            isPaused = !isPaused;
            let btnP = document.getElementById('btnPause');
            btnP.textContent = isPaused ? "Resume" : "Pause";
            if (isPaused) btnP.classList.add('paused');
            else btnP.classList.remove('paused');
        };

        document.getElementById('btnReset').onclick = doReset;
        
        ['energy','height','width','spread'].forEach(id => {
          document.getElementById(id+'Slider').oninput = function() { updateParams(); if(!isRunning) doReset(); };
        });
    } catch (e) {
        let container = document.getElementById('qt-canvas');
        if (container) container.innerHTML = `<div style='color:red; padding:20px;'>Setup Crash: ${e.message}</div>`;
    }
  };

  function updateParams() {
    let eSl = document.getElementById('energySlider');
    let hSl = document.getElementById('heightSlider');
    let wSl = document.getElementById('widthSlider');
    let sSl = document.getElementById('spreadSlider');

    if (eSl) E = parseFloat(eSl.value) || 0.5;
    if (hSl) V0 = parseFloat(hSl.value) || 1.0;
    if (wSl) barrierW = parseFloat(wSl.value) || 0.8;
    if (sSl) spread = parseFloat(sSl.value) || 0.8;
    
    document.getElementById('energyVal').textContent = E.toFixed(2);
    document.getElementById('heightVal').textContent = V0.toFixed(2);
    document.getElementById('widthVal').textContent = barrierW.toFixed(2);
    document.getElementById('spreadVal').textContent = spread.toFixed(2);
    
    T = calcT(E, V0, barrierW);
    if (isNaN(T) || !isFinite(T)) T = 0; 
    R = 1 - T;
    
    document.getElementById('statT').textContent = (T * 100).toFixed(1) + '%';
    document.getElementById('statR').textContent = (R * 100).toFixed(1) + '%';
  }

  p.draw = function() {
    try {
        p.background(10, 15, 22); 
        
        let axisY = H * AXIS_Y_FRAC;
        let bwPx = 20 + ((barrierW - 0.1) / 2.9) * 130; 
        let bx1 = W * 0.5 - bwPx / 2;
        let bx2 = W * 0.5 + bwPx / 2;
        let bMid = (bx1 + bx2) / 2;
        let sigmaPx = spread * 40;

        // --- GLOBAL TIMELINE UPDATE ---
        if (isRunning && !isPaused) {
            // Speed relies on particle energy
            let speed = 0.0015 + Math.sqrt(E) * 0.002;
            
            // Slow down dramatically when crossing the interaction boundary (between 0.4 and 0.6 progress)
            if (timelineProgress > 0.35 && timelineProgress < 0.65) {
                speed *= 0.2; // Slow-mo interaction
            }
            
            timelineProgress += speed;
            simTime += 1.0; // Drive continuous phase oscillation

            if (timelineProgress >= 1.0) doReset();
        } else if (isRunning && isPaused) {
            // Keep phase oscillating slightly to show it's alive, but freeze propagation
            simTime += 0.2; 
        }

        // --- CAMERA DIRECTOR ---
        let currentPhase = 0;
        if (isRunning) {
            if (timelineProgress < 0.3) {
                currentPhase = 1; // Approach
                targetCamScale = 1.0; targetCamX = 0; targetCamY = 0;
            } 
            else if (timelineProgress >= 0.3 && timelineProgress < 0.7) {
                currentPhase = 2; // Interaction (Zoomed)
                targetCamScale = 2.0; 
                targetCamX = W * 0.5 - bMid * targetCamScale;
                targetCamY = H * 0.5 - axisY * targetCamScale + 80;
            }
            else {
                currentPhase = 3; // Departure
                targetCamScale = 1.0; targetCamX = 0; targetCamY = 0;
            }
        }

        // Camera Lerping
        camScale += (targetCamScale - camScale) * 0.08;
        camScale = Math.max(0.1, Math.min(camScale, 4.0)); 
        camX += (targetCamX - camX) * 0.08;
        camY += (targetCamY - camY) * 0.08;

        // --- RENDER ---
        p.push();
        p.translate(camX, camY);
        p.scale(camScale);

        drawEnvironment(axisY, bx1, bx2);

        if (simMode === 'quantum') {
            if (isRunning) {
                drawUnifiedWaveFunction(axisY, bx1, bx2, sigmaPx);
            }
        } else {
            if (isRunning) {
                drawClassicalParticle(axisY, bx1, bx2);
            }
        }

        p.pop();

        drawUI(currentPhase);

    } catch (err) {
        p.resetMatrix(); p.background(100, 0, 0); p.fill(255); p.noStroke(); p.textAlign(p.LEFT);
        p.text("Crash Prevented. Render Error:", 20, 30); p.text(err.message, 20, 60); p.noLoop(); 
    }
  };

  // --- THE UNIFIED WAVE ENGINE ---
  // This calculates the perfect superposition at every pixel X without jumping
  function drawUnifiedWaveFunction(axisY, bx1, bx2, sigma) {
      // Map timeline (0 to 1) to physical space (-W*0.2 to W*1.2)
      let totalDist = W * 1.4;
      let startX = -W * 0.2;
      let cx_in = startX + (totalDist * timelineProgress);
      
      let sigSq = Math.max(0.001, sigma * sigma);
      let k_inc = Math.sqrt(E) * 0.12; 
      let wt = simTime * 0.15; // Oscillation speed
      
      let amp_R = Math.sqrt(Math.max(0, R));
      let amp_T = Math.sqrt(Math.max(0, T));
      
      let decay = E < V0 ? Math.sqrt(Math.max(0.0001, V0 - E)) * 0.10 : 0;
      let k_bar = E >= V0 ? Math.sqrt(Math.max(0.0001, E - V0)) * 0.12 : 0;

      // Ensure transmitted phase aligns perfectly at right wall
      let phase_at_bx2 = E >= V0 ? k_bar * (bx2 - bx1) - wt : -wt;

      // Draw Probability Density (Fill)
      p.noStroke();
      p.beginShape();
      // Draw from left edge to right edge of visible packet
      let minDraw = Math.min(cx_in, bx1) - sigma * 4;
      let maxDraw = Math.max(cx_in, bx2) + sigma * 4;
      p.vertex(minDraw, axisY);

      for (let x = minDraw; x <= maxDraw; x += 1.5) {
          let val = 0;
          let env = 0;
          let colorBlend = COL_INC; // Default Blue

          if (x <= bx1) {
              // REGION 1: Superposition (Incident + Reflected)
              // Reflected wave mirrors incident wave from the wall
              let cx_ref = bx1 + (bx1 - cx_in); 
              let env_i = Math.exp(-Math.pow(x - cx_in, 2) / (2 * sigSq));
              let env_r = amp_R * Math.exp(-Math.pow(x - cx_ref, 2) / (2 * sigSq));
              
              val = env_i * Math.cos(k_inc * (x - bx1) - wt) + env_r * Math.cos(-k_inc * (x - bx1) - wt);
              
              // Visual color blend (Blue to Purple)
              if (env_r > 0.01) colorBlend = p.lerpColor(p.color(COL_INC), p.color(COL_SUPER), env_r / (env_i + env_r));
          } 
          else if (x > bx1 && x <= bx2) {
              // REGION 2: Inside Barrier
              let env_base = Math.exp(-Math.pow(bx1 - cx_in, 2) / (2 * sigSq));
              let amp_L = env_base * (1.0 + amp_R);
              let amp_R_bound = env_base * amp_T;
              
              if (E < V0) {
                  // Evanescent Decay
                  let ratio = Math.max(0.0001, amp_T / (1.0 + amp_R));
                  let req_kappa = -Math.log(ratio) / (bx2 - bx1);
                  val = amp_L * Math.exp(-req_kappa * (x - bx1)) * Math.cos(-wt);
                  colorBlend = COL_SUPER;
              } else {
                  // Tunneling Propagation
                  let pct = (x - bx1) / (bx2 - bx1);
                  let amp_x = amp_L + pct * (amp_R_bound - amp_L);
                  val = amp_x * Math.cos(k_bar * (x - bx1) - wt);
                  colorBlend = COL_TRANS;
              }
          } 
          else {
              // REGION 3: Transmitted Wave
              let cx_tr = bx2 + (cx_in - bx1);
              let env_t = amp_T * Math.exp(-Math.pow(x - cx_tr, 2) / (2 * sigSq));
              let phase = E < V0 ? k_inc * (x - bx2) - wt : k_inc * (x - bx2) + phase_at_bx2;
              val = env_t * Math.cos(phase);
              colorBlend = COL_TRANS; // Pure Green
          }

          p.fill(colorBlend.levels ? colorBlend.levels[0] : colorBlend[0], 
                 colorBlend.levels ? colorBlend.levels[1] : colorBlend[1], 
                 colorBlend.levels ? colorBlend.levels[2] : colorBlend[2], 50);
          p.vertex(x, axisY - (val * val * 65)); // Density envelope
      }
      p.vertex(maxDraw, axisY);
      p.endShape();

      // Draw Real Wave Line
      p.noFill();
      p.strokeWeight(2.5 / camScale);
      p.beginShape();
      for (let x = minDraw; x <= maxDraw; x += 1) { // High res line
          let val = 0;
          let colorBlend = COL_INC;

          if (x <= bx1) {
              let cx_ref = bx1 + (bx1 - cx_in); 
              let env_i = Math.exp(-Math.pow(x - cx_in, 2) / (2 * sigSq));
              let env_r = amp_R * Math.exp(-Math.pow(x - cx_ref, 2) / (2 * sigSq));
              val = env_i * Math.cos(k_inc * (x - bx1) - wt) + env_r * Math.cos(-k_inc * (x - bx1) - wt);
              if (env_r > 0.01) colorBlend = p.lerpColor(p.color(COL_INC), p.color(COL_SUPER), env_r / (env_i + env_r));
          } 
          else if (x > bx1 && x <= bx2) {
              let env_base = Math.exp(-Math.pow(bx1 - cx_in, 2) / (2 * sigSq));
              let amp_L = env_base * (1.0 + amp_R);
              let amp_R_bound = env_base * amp_T;
              
              if (E < V0) {
                  let ratio = Math.max(0.0001, amp_T / (1.0 + amp_R));
                  let req_kappa = -Math.log(ratio) / (bx2 - bx1);
                  val = amp_L * Math.exp(-req_kappa * (x - bx1)) * Math.cos(-wt);
                  colorBlend = COL_SUPER;
              } else {
                  let pct = (x - bx1) / (bx2 - bx1);
                  let amp_x = amp_L + pct * (amp_R_bound - amp_L);
                  val = amp_x * Math.cos(k_bar * (x - bx1) - wt);
                  colorBlend = COL_TRANS;
              }
          } 
          else {
              let cx_tr = bx2 + (cx_in - bx1);
              let env_t = amp_T * Math.exp(-Math.pow(x - cx_tr, 2) / (2 * sigSq));
              let phase = E < V0 ? k_inc * (x - bx2) - wt : k_inc * (x - bx2) + phase_at_bx2;
              val = env_t * Math.cos(phase);
              colorBlend = COL_TRANS;
          }

          p.stroke(colorBlend.levels ? colorBlend.levels[0] : colorBlend[0], 
                   colorBlend.levels ? colorBlend.levels[1] : colorBlend[1], 
                   colorBlend.levels ? colorBlend.levels[2] : colorBlend[2], 255);
          p.vertex(x, axisY - (val * 45));
      }
      p.endShape();
  }

  function drawClassicalParticle(axisY, bx1, bx2) {
      let totalDist = W * 1.4;
      let startX = -W * 0.2;
      let raw_x = startX + (totalDist * timelineProgress);
      let r = 12;
      let squish = 1.0;
      let final_x = raw_x;
      let canPass = E >= V0;

      if (raw_x > bx1 - r && raw_x < bx2 + r) {
          if (!canPass) {
              // It bounces back
              let overlap = raw_x - (bx1 - r);
              if (overlap < 15) { final_x = bx1 - r; squish = 1.0 - (overlap/30); } // Squishing
              else final_x = (bx1 - r) - (overlap - 15); // Reflecting
          } else {
              // It slows down inside
              let speedRatio = Math.sqrt(E - V0) / Math.sqrt(E);
              final_x = bx1 - r + (raw_x - (bx1 - r)) * speedRatio;
          }
      } else if (!canPass && raw_x >= bx2 + r) {
           final_x = startX; // Hide it if it bounced and time kept going
      }

      p.push(); p.translate(final_x, axisY - r);
      if (canPass && final_x > bx1 && final_x < bx2) {
          p.noStroke(); p.fill(46, 255, 132, 20); p.circle(-r, 0, r*5);
      }
      if (squish !== 1.0) { p.translate(r, 0); p.scale(squish, 2 - squish); p.translate(-r, 0); }

      let c = E >= V0 ? COL_TRANS : COL_REFL;
      p.noStroke(); p.fill(c[0], c[1], c[2], 60); p.circle(0, 0, r * 2.8);
      p.fill(c[0], c[1], c[2], 255); p.circle(0, 0, r * 2);
      p.fill(255, 255, 255, 180); p.circle(-r*0.3, -r*0.3, r*0.5);
      p.pop();
  }

  function drawEnvironment(axisY, bx1, bx2) {
    let potH = 20 + ((V0 - 0.3) / 1.7) * 90; 
    
    p.stroke(25, 35, 50); p.strokeWeight(1 / camScale);
    for (let x = -W; x < W*2; x += 40) p.line(x, -H, x, H*2);
    for (let y = -H; y < H*2; y += 40) p.line(-W, y, W*2, y);

    p.noStroke();
    p.fill(46, 182, 255, 25); p.rect(bx1, axisY - potH, bx2 - bx1, potH);
    p.fill(46, 182, 255, 40); p.rect(bx1, axisY - potH * 0.3, bx2 - bx1, potH * 0.3);

    p.stroke(46, 182, 255, 150); p.strokeWeight(2 / camScale);
    p.line(bx1, axisY, bx1, axisY - potH); p.line(bx2, axisY, bx2, axisY - potH); p.line(bx1, axisY - potH, bx2, axisY - potH);

    p.stroke(50, 70, 90); p.strokeWeight(2 / camScale);
    p.line(-W, axisY, W*2, axisY);

    let ey = axisY - (E / Math.max(V0, 0.01)) * potH;
    let ec = E >= V0 ? COL_TRANS : COL_REFL;
    p.stroke(ec[0], ec[1], ec[2], 180); p.strokeWeight(1.5 / camScale);
    p.line(-W, ey, W*2, ey);
  }

  function drawUI(currentPhase) {
      if (isRunning) {
          p.fill(255); p.noStroke(); p.textSize(12); p.textAlign(p.CENTER);
          let textStr = currentPhase === 1 ? "Tracking Incident Packet..." : 
                        currentPhase === 2 ? (simMode === 'quantum' ? "Superposition & Exponential Decay..." : "Kinetic Boundary Interaction...") : 
                        "Transmitted / Reflected Views";
          p.text(textStr, W/2, 30);
      }
      if (isPaused) {
          p.fill(255, 132, 46); p.noStroke(); p.textSize(16); p.textAlign(p.RIGHT);
          p.text("⏸ PAUSED", W - 20, 30);
      }
  }

}, document.getElementById('qt-canvas'));
</script>
