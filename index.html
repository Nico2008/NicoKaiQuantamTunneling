<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinematic Quantum Tunneling - Fixed Rendering</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<style>
  :root {
    --bg-main: #06090e;
    --bg-panel: #0d131c;
    --border: #1a2636;
    --text-main: #7a93b3;
    --text-light: #dce6f2;
    --accent-blue: #2eb6ff;
    --accent-green: #2eff84;
    --accent-orange: #ff842e;
    --accent-purple: #c47aff;
  }
  body { margin: 0; padding: 20px; background: #030406; display: flex; justify-content: center; font-family: system-ui, -apple-system, sans-serif; user-select: none; }
  
  #qt-wrap { 
    background: var(--bg-main); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); 
    box-shadow: 0 25px 60px rgba(0,0,0,0.9); width: 100%; max-width: 900px;
  }
  
  #qt-header { background: var(--bg-panel); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  #qt-header .title { color: var(--text-light); font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 10px; letter-spacing: 0.5px; }
  #qt-header .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent-purple); box-shadow: 0 0 12px var(--accent-purple); animation: pulse 2s infinite; }
  @keyframes pulse { 0% { opacity: 0.5; box-shadow: 0 0 5px var(--accent-purple); } 50% { opacity: 1; box-shadow: 0 0 15px var(--accent-purple); } 100% { opacity: 0.5; box-shadow: 0 0 5px var(--accent-purple); } }

  #qt-tabs { display: flex; gap: 8px; background: #080c12; padding: 4px; border-radius: 8px; border: 1px solid var(--border); }
  .tab-btn { background: transparent; border: none; color: var(--text-main); font-size: 13px; padding: 6px 18px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
  .tab-btn:hover { color: var(--text-light); }
  .tab-btn.active { background: #162130; color: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
  
  #qt-canvas { display: block; width: 100%; height: 440px; cursor: crosshair; }
  
  #qt-controls { background: var(--bg-panel); border-top: 1px solid var(--border); padding: 24px; display: flex; flex-wrap: wrap; gap: 24px; }
  .control-group { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 150px; }
  .control-label { color: var(--text-main); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; }
  .control-row { display: flex; align-items: center; gap: 12px; background: #06090e; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); }
  .control-val { color: var(--text-light); font-size: 14px; font-weight: 700; min-width: 35px; text-align: right; }
  
  input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; height: 4px; background: #162130; border-radius: 2px; outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--text-light); cursor: pointer; transition: transform 0.1s; }
  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
  
  .left-col { display: flex; flex-direction: column; gap: 16px; flex: 1.2; min-width: 260px; }
  .right-col { display: flex; flex-direction: column; gap: 16px; flex: 2; min-width: 320px; }
  
  #qt-stats { display: flex; gap: 12px; }
  .stat-card { background: #06090e; border: 1px solid var(--border); border-radius: 8px; padding: 12px; flex: 1; text-align: center; }
  .stat-val { font-size: 22px; font-weight: 700; font-family: monospace; }
  .stat-lbl { font-size: 10px; color: var(--text-main); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }
  
  .btn-row { display: flex; gap: 12px; }
  .action-btn { padding: 14px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 700; transition: all 0.15s; flex: 1; text-transform: uppercase; letter-spacing: 0.5px; }
  .btn-fire { background: var(--accent-purple); color: #fff; box-shadow: 0 4px 15px rgba(196, 122, 255, 0.3); }
  .btn-fire:hover { filter: brightness(1.1); transform: translateY(-2px); }
  .btn-fire:active { transform: translateY(1px); box-shadow: none; }
  .btn-reset { background: transparent; color: var(--text-main); border: 1px solid var(--border); }
  .btn-reset:hover { background: #162130; color: #fff; }
</style>
</head>
<body>

<div id="qt-wrap">
  <div id="qt-header">
    <div class="title"><div class="dot"></div>Cinematic Quantum Tunneling</div>
    <div id="qt-tabs">
      <button class="tab-btn active" id="tabQuantum" onclick="setMode('quantum')">Quantum</button>
      <button class="tab-btn" id="tabClassical" onclick="setMode('classical')">Classical</button>
    </div>
  </div>
  <div id="qt-canvas"></div>
  <div id="qt-controls">
    <div class="left-col">
      <div class="btn-row">
        <button class="action-btn btn-fire" id="btnFire">Launch Particle</button>
        <button class="action-btn btn-reset" id="btnReset">Reset</button>
      </div>
      <div id="qt-stats">
        <div class="stat-card">
          <div class="stat-val" id="statT" style="color:var(--accent-green)">--</div>
          <div class="stat-lbl">Transmission</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="statR" style="color:var(--accent-orange)">--</div>
          <div class="stat-lbl">Reflection</div>
        </div>
      </div>
    </div>
    
    <div class="right-col">
      <div style="display:flex; gap: 16px;">
        <div class="control-group">
          <div class="control-label">Particle Energy (E)</div>
          <div class="control-row">
            <input type="range" id="energySlider" min="0.1" max="1.5" value="0.5" step="0.01">
            <span class="control-val" id="energyVal">0.50</span>
          </div>
        </div>
        <div class="control-group">
          <div class="control-label">Barrier Height (V₀)</div>
          <div class="control-row">
            <input type="range" id="heightSlider" min="0.3" max="2.0" value="1.0" step="0.01">
            <span class="control-val" id="heightVal">1.00</span>
          </div>
        </div>
      </div>
      <div style="display:flex; gap: 16px;">
        <div class="control-group">
          <div class="control-label">Barrier Width (a)</div>
          <div class="control-row">
            <input type="range" id="widthSlider" min="0.1" max="3.0" value="0.8" step="0.05">
            <span class="control-val" id="widthVal">0.80</span>
          </div>
        </div>
        <div class="control-group">
          <div class="control-label">Wave Spread (&sigma;)</div>
          <div class="control-row">
            <input type="range" id="spreadSlider" min="0.3" max="1.5" value="0.8" step="0.05">
            <span class="control-val" id="spreadVal">0.80</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let simMode = 'quantum';
function setMode(m) {
  simMode = m;
  document.getElementById('tabQuantum').className = 'tab-btn' + (m==='quantum'?' active':'');
  document.getElementById('tabClassical').className = 'tab-btn' + (m==='classical'?' active':'');
  doReset();
}

new p5(function(p) {
  let W, H;
  const AXIS_Y_FRAC = 0.65;

  let E = 0.5, V0 = 1.0, barrierW = 0.8, spread = 0.8;
  let T = 0, R = 1;

  let phase = 0; 
  let animTimer = 0;
  
  let camX = 0, camY = 0, camScale = 1.0;
  let targetCamX = 0, targetCamY = 0, targetCamScale = 1.0;

  let waves = [];
  let flowParticles = [];
  let sparks = []; 
  let classicalParticle = null;

  function calcT(E_, V0_, a_nm) {
    let a = a_nm * 8; 
    if (E_ === V0_) return 1 / (1 + (2 * 0.038 * V0_ * a * a)); 
    if (E_ > V0_) {
      let k1 = Math.sqrt(E_), k2 = Math.sqrt(E_ - V0_);
      let sinSq = Math.pow(Math.sin(k2 * a), 2);
      return 1 / (1 + (Math.pow(k1*k1 - k2*k2, 2) * sinSq) / (4 * k1*k1 * k2*k2));
    } else {
      let kappa = Math.sqrt(V0_ - E_);
      let sinhSq = Math.pow(Math.sinh(kappa * a), 2);
      return 1 / (1 + (V0_ * V0_ * sinhSq) / (4 * E_ * (V0_ - E_)));
    }
  }

  function doReset() {
    waves = [];
    flowParticles = [];
    sparks = [];
    classicalParticle = null;
    phase = 0; animTimer = 0;
    targetCamScale = 1.0; targetCamX = 0; targetCamY = 0;
    camScale = 1.0; camX = 0; camY = 0; 
    
    document.getElementById('btnFire').disabled = false;
    document.getElementById('btnFire').style.opacity = 1;
    document.getElementById('btnFire').textContent = "Launch Particle";
  }
  window.doReset = doReset;

  function buildWave(cx, amp, sigma, k0, type) {
    let col;
    if (type === 'transmitted') col = p.color(46, 255, 132); 
    else if (type === 'reflected') col = p.color(255, 132, 46); 
    else col = p.color(46, 182, 255); 
    return { cx, amp, sigma, k0, col, type, dead: false };
  }

  p.setup = function() {
    let container = document.getElementById('qt-canvas');
    W = container.offsetWidth; H = container.offsetHeight;
    let cnv = p.createCanvas(W, H);
    cnv.parent('qt-canvas');
    
    updateParams();
    
    document.getElementById('btnFire').onclick = () => { 
      if (phase === 0) { 
        phase = 1; 
        let startX = -W * 0.2; 
        let sigma = spread * 40;
        let k0 = Math.sqrt(E) * 3.0;
        
        if (simMode === 'quantum') waves = [buildWave(startX, 1.0, sigma, k0, 'incident')];
        else classicalParticle = { x: startX, v: 3.0 * Math.sqrt(E), r: 12, squish: 1.0 };
        
        document.getElementById('btnFire').disabled = true;
        document.getElementById('btnFire').style.opacity = 0.5;
        document.getElementById('btnFire').textContent = "In Motion...";
      } 
    };
    document.getElementById('btnReset').onclick = doReset;
    
    ['energy','height','width','spread'].forEach(id => {
      document.getElementById(id+'Slider').oninput = function() {
        updateParams();
        if(phase === 0) doReset(); 
      };
    });
  };

  function updateParams() {
    E = parseFloat(document.getElementById('energySlider').value);
    V0 = parseFloat(document.getElementById('heightSlider').value);
    barrierW = parseFloat(document.getElementById('widthSlider').value);
    spread = parseFloat(document.getElementById('spreadSlider').value);
    
    document.getElementById('energyVal').textContent = E.toFixed(2);
    document.getElementById('heightVal').textContent = V0.toFixed(2);
    document.getElementById('widthVal').textContent = barrierW.toFixed(2);
    document.getElementById('spreadVal').textContent = spread.toFixed(2);
    
    T = calcT(E, V0, barrierW);
    R = 1 - T;
    document.getElementById('statT').textContent = (T * 100).toFixed(1) + '%';
    document.getElementById('statR').textContent = (R * 100).toFixed(1) + '%';
  }

  function getBarrierBounds() {
    let bwPx = p.map(barrierW, 0.1, 3.0, 20, 150);
    let bx1 = W * 0.5 - bwPx / 2;
    let bx2 = W * 0.5 + bwPx / 2;
    return { bx1, bx2, bwPx };
  }

  p.draw = function() {
    p.background(6, 9, 14);
    
    let axisY = H * AXIS_Y_FRAC;
    let { bx1, bx2 } = getBarrierBounds();
    let bMid = (bx1 + bx2) / 2;
    let baseSpeed = 3.0 + Math.sqrt(E) * 2.0;

    // --- STATE MACHINE & CAMERA ---
    if (simMode === 'quantum') {
        let mainWave = waves.find(w => w.type === 'incident');
        
        if (phase === 1 && mainWave) { 
            mainWave.cx += baseSpeed;
            targetCamScale = 1.3;
            targetCamX = W * 0.4 - mainWave.cx * targetCamScale;
            targetCamY = H * 0.5 - axisY * targetCamScale + 50;

            if (mainWave.cx >= bx1 - mainWave.sigma * 1.5) { phase = 2; animTimer = 0; }
        } 
        else if (phase === 2 && mainWave) { 
            mainWave.cx += baseSpeed * 0.1; 
            targetCamScale = 2.4;
            targetCamX = W * 0.5 - bMid * targetCamScale;
            targetCamY = H * 0.5 - axisY * targetCamScale + 80;

            animTimer++;
            if (animTimer > 30) { phase = 3; animTimer = 0; flowParticles = []; }
        }
        else if (phase === 3 && mainWave) { 
            mainWave.cx += baseSpeed * 0.02; 
            animTimer++;
            
            if (animTimer % 2 === 0 && animTimer < 110) {
                spawnFlowParticle(bx1, bx2, mainWave.sigma);
            }
            updateFlowParticles(baseSpeed * 0.5);

            if (animTimer > 150) { 
                waves.push(buildWave(bx2, Math.sqrt(T), mainWave.sigma, mainWave.k0, 'transmitted'));
                waves.push(buildWave(bx1, Math.sqrt(R), mainWave.sigma, -mainWave.k0, 'reflected'));
                mainWave.dead = true;
                phase = 4; animTimer = 0; flowParticles = [];
            }
        }
        else if (phase === 4) { 
            targetCamScale = 1.0; targetCamX = 0; targetCamY = 0;
            
            for (let w of waves) {
                if (w.dead) continue;
                if (w.type === 'transmitted') w.cx += baseSpeed * 0.5;
                if (w.type === 'reflected') w.cx -= baseSpeed * 0.5;
            }
            if (Math.abs(camScale - 1.0) < 0.02) phase = 5;
        }
        else if (phase === 5) { 
            for (let w of waves) {
                if (w.dead) continue;
                if (w.type === 'transmitted') w.cx += baseSpeed;
                if (w.type === 'reflected') w.cx -= baseSpeed;
                if ((w.type === 'transmitted' && w.cx > W + w.sigma*3) || 
                    (w.type === 'reflected' && w.cx < -w.sigma*3)) { w.dead = true; }
            }
            if (waves.every(w => w.dead)) doReset();
        }
    } 
    else {
        // Classical State Machine
        if (classicalParticle) {
            let cp = classicalParticle;
            let canPass = E >= V0;

            if (phase === 1) { 
                cp.x += cp.v;
                targetCamScale = 1.3;
                targetCamX = W * 0.4 - cp.x * targetCamScale;
                targetCamY = H * 0.5 - axisY * targetCamScale + 50;

                if (cp.x >= bx1 - cp.r * 4) { phase = 2; animTimer = 0; }
            }
            else if (phase === 2) { 
                cp.x += cp.v * 0.2; 
                targetCamScale = 2.4;
                targetCamX = W * 0.5 - bMid * targetCamScale;
                targetCamY = H * 0.5 - axisY * targetCamScale + 80;

                if (cp.x >= bx1 - cp.r) {
                    cp.x = bx1 - cp.r;
                    phase = 3; animTimer = 0;
                    
                    if (!canPass) {
                        for(let i=0; i<15; i++) sparks.push({ x: bx1, y: axisY-cp.r + p.random(-10,10), vx: p.random(-3, -0.5), vy: p.random(-2, 2), life: 255 });
                    }
                }
            }
            else if (phase === 3) { 
                animTimer++;
                if (!canPass) {
                    cp.squish = p.map(Math.sin(animTimer * 0.1), 0, 1, 1.0, 0.5);
                } else {
                    cp.x += 0.5; 
                }

                if (animTimer > 60) {
                    phase = 4; cp.squish = 1.0;
                    if (!canPass) cp.v = -cp.v; 
                }
            }
            else if (phase === 4) { 
                targetCamScale = 1.0; targetCamX = 0; targetCamY = 0;
                if (canPass) {
                    cp.x += 3.0 * Math.sqrt(Math.max(0.01, E - V0)); 
                    if (cp.x > bx2 + cp.r) { phase = 5; cp.v = 3.0 * Math.sqrt(E); }
                } else {
                    cp.x += cp.v;
                    if (Math.abs(camScale - 1.0) < 0.02) phase = 5;
                }
            }
            else if (phase === 5) { 
                cp.x += cp.v;
                if (cp.x > W + 50 || cp.x < -50) doReset();
            }
        }
    }

    // Camera Lerp
    camScale = p.lerp(camScale, targetCamScale, 0.08);
    camX = p.lerp(camX, targetCamX, 0.08);
    camY = p.lerp(camY, targetCamY, 0.08);

    p.push();
    p.translate(camX, camY);
    p.scale(camScale);

    drawEnvironment(axisY, bx1, bx2);

    if (simMode === 'quantum') {
        if (phase === 3) drawProbabilityFlow(axisY, bx1, bx2);
        for (let w of waves) { if (!w.dead) drawWaveEnvelope(w, axisY); }
    } else {
        drawClassicalParticle(axisY);
        updateAndDrawSparks();
    }

    p.pop();

    if (phase !== 0) drawPhaseIndicator();
  };

  // --- QUANTUM FLOW LOGIC ---
  function spawnFlowParticle(bx1, bx2, sigma) {
      let isTransmitting = p.random(1) < T;
      let depth = bx2; 
      
      if (!isTransmitting) {
          if (E < V0) {
              let kappa = Math.sqrt(V0 - E);
              let u = p.random(0.01, 1); 
              let penetration = -Math.log(u) / (2 * kappa * 0.5); 
              depth = bx1 + Math.min(penetration, bx2 - bx1 - 2); 
          } else {
              depth = bx1 + p.random((bx2 - bx1) * 0.8);
          }
      }

      flowParticles.push({
          x: bx1,
          y: p.random(-sigma * 0.4, sigma * 0.4), // Safely bounded random Y
          dest: isTransmitting ? 'trans' : 'refl',
          maxDepth: depth,
          vx: E < V0 ? 2.0 : 3.0,
          dir: 1, 
          history: [] 
      });
  }

  function updateFlowParticles(baseSpeed) {
      for (let i = flowParticles.length - 1; i >= 0; i--) {
          let fp = flowParticles[i];
          
          fp.history.push({x: fp.x, y: fp.y});
          if (fp.history.length > 10) fp.history.shift();

          fp.x += fp.vx * fp.dir;

          if (fp.dir === 1) { 
              // Enforce a minimum velocity so transmitted particles don't freeze inside the barrier
              if (E < V0) fp.vx = Math.max(0.5, fp.vx * 0.95); 
              
              if (fp.x >= fp.maxDepth) {
                  if (fp.dest === 'refl') {
                      fp.dir = -1; 
                      fp.vx = 0.5; 
                  }
              }
          } else { 
              fp.vx = Math.min(fp.vx * 1.1, baseSpeed); 
              if (fp.x < bx1 - 20) {
                  flowParticles.splice(i, 1); 
              }
          }
      }
  }

  function drawProbabilityFlow(axisY, bx1, bx2) {
      p.noFill();
      p.stroke(196, 122, 255, 60);
      p.strokeWeight(1 / camScale);
      p.beginShape();
      for (let px = bx1; px <= bx2; px += 2) {
         let x = px - bx1;
         let val = E < V0 ? Math.exp(-Math.sqrt(V0 - E) * 0.1 * x) : 1.0;
         let envelope = p.map(px, bx1, bx2, 1.0, Math.sqrt(T));
         p.vertex(px, axisY - (val * envelope * 55));
      }
      p.endShape();

      // Crash-Safe Particle Path Rendering
      p.strokeWeight(2.5 / camScale);
      for (let fp of flowParticles) {
          let col = fp.dest === 'trans' ? p.color(46, 255, 132) : p.color(255, 132, 46);
          let r = p.red(col), g = p.green(col), b = p.blue(col);

          // Draw the history using robust line segments instead of changing stroke inside beginShape
          if (fp.history.length > 1) {
              for (let j = 0; j < fp.history.length - 1; j++) {
                  let h1 = fp.history[j];
                  let h2 = fp.history[j+1];
                  let alpha = p.map(j, 0, fp.history.length - 1, 0, 255);
                  p.stroke(r, g, b, alpha);
                  p.line(h1.x, axisY - Math.abs(h1.y), h2.x, axisY - Math.abs(h2.y));
              }
          }
          
          // Head (Using CSS compliant RGBA string for crash prevention)
          p.noStroke();
          p.fill(r, g, b);
          p.drawingContext.shadowBlur = 8 * camScale;
          p.drawingContext.shadowColor = `rgba(${r},${g},${b},1)`;
          p.circle(fp.x, axisY - Math.abs(fp.y), 3 / camScale);
          p.drawingContext.shadowBlur = 0;
      }
  }

  // --- DRAWING HELPERS ---
  function drawEnvironment(axisY, bx1, bx2) {
    let potH = p.map(V0, 0.3, 2.0, 20, 110);
    
    p.stroke(25, 35, 50);
    p.strokeWeight(1 / camScale);
    for (let x = -W; x < W*2; x += 40) p.line(x, -H, x, H*2);

    p.noStroke();
    let fillGrad = p.drawingContext.createLinearGradient(0, axisY - potH, 0, axisY);
    fillGrad.addColorStop(0, 'rgba(46, 182, 255, 0.15)');
    fillGrad.addColorStop(1, 'rgba(46, 182, 255, 0.02)');
    p.drawingContext.fillStyle = fillGrad;
    p.rect(bx1, axisY - potH, bx2 - bx1, potH);

    p.stroke(46, 182, 255, 150);
    p.strokeWeight(2 / camScale);
    p.line(bx1, axisY, bx1, axisY - potH);
    p.line(bx2, axisY, bx2, axisY - potH);
    p.line(bx1, axisY - potH, bx2, axisY - potH);

    p.stroke(50, 70, 90);
    p.strokeWeight(2 / camScale);
    p.line(-W, axisY, W*2, axisY);

    let ey = axisY - p.map(E, 0, Math.max(V0, 0.01), 0, potH);
    p.stroke(E >= V0 ? '#2eff84' : '#ff842e');
    p.strokeWeight(1.5 / camScale);
    p.drawingContext.setLineDash([5 / camScale, 5 / camScale]);
    p.line(-W, ey, W*2, ey);
    p.drawingContext.setLineDash([]);
  }

  function drawWaveEnvelope(wp, axisY) {
    let pts = [];
    let drawScale = 55; 
    for (let px = wp.cx - wp.sigma*3; px <= wp.cx + wp.sigma*3; px += 1.5) {
      let dx = px - wp.cx;
      let gaussian = Math.exp(-(dx * dx) / (2 * wp.sigma * wp.sigma));
      let density = wp.amp * wp.amp * gaussian * gaussian; 
      pts.push({ x: px, y: axisY - density * drawScale });
    }

    let c = wp.col;
    p.noStroke();
    p.fill(p.red(c), p.green(c), p.blue(c), 40);
    p.beginShape();
    p.vertex(pts[0].x, axisY);
    for (let pt of pts) p.vertex(pt.x, pt.y);
    p.vertex(pts[pts.length-1].x, axisY);
    p.endShape();
    
    p.stroke(c);
    p.strokeWeight(2.5 / camScale);
    p.noFill();
    p.beginShape();
    for (let pt of pts) p.vertex(pt.x, pt.y);
    p.endShape();
  }

  function drawClassicalParticle(axisY) {
    if (!classicalParticle) return;
    let cp = classicalParticle;
    let by = axisY - cp.r;
    let canPass = E >= V0;

    p.push();
    p.translate(cp.x, by);
    
    if (phase === 3 && canPass) {
        p.noStroke();
        p.fill(46, 255, 132, 20);
        p.circle(-cp.r, 0, cp.r*5);
        p.circle(-cp.r*2, 0, cp.r*3);
    }

    if (cp.squish !== 1.0) {
        p.translate(cp.r, 0); p.scale(cp.squish, 2 - cp.squish); p.translate(-cp.r, 0);
    }

    let cColor = E >= V0 ? p.color(46, 255, 132) : p.color(255, 132, 46);
    
    p.noStroke();
    p.fill(p.red(cColor), p.green(cColor), p.blue(cColor), 60);
    p.circle(0, 0, cp.r * 2.8);
    
    p.fill(cColor);
    p.circle(0, 0, cp.r * 2);
    
    p.fill(255, 255, 255, 180);
    p.circle(-cp.r*0.3, -cp.r*0.3, cp.r*0.5);
    p.pop();
  }

  function updateAndDrawSparks() {
      for(let i = sparks.length - 1; i >= 0; i--) {
          let s = sparks[i];
          s.x += s.vx; s.y += s.vy;
          s.life -= 15;
          // Protect against negative alpha values
          p.stroke(255, 132, 46, Math.max(0, s.life));
          p.strokeWeight(2 / camScale);
          p.line(s.x, s.y, s.x - s.vx*2, s.y - s.vy*2);
          if (s.life <= 0) sparks.splice(i, 1);
      }
  }

  function drawPhaseIndicator() {
    p.fill(255); p.noStroke(); p.textSize(12); p.textAlign(p.CENTER);
    let textStr = "";
    if (phase === 1) textStr = "Tracking Incident Packet...";
    else if (phase === 2) textStr = "Approaching Barrier Boundary...";
    else if (phase === 3) {
        if (simMode === 'quantum') textStr = "Probability Current: Particles Penetrating & Turning Back";
        else textStr = E >= V0 ? "Surmounting Potential Barrier (Slowing Down)" : "Kinetic Impact & Hard Reflection";
    }
    else if (phase === 4 || phase === 5) textStr = "Macro View Restored";
    p.text(textStr, W/2, 30);
  }

}, document.getElementById('qt-canvas'));
</script>
