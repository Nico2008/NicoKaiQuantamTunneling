<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinematic Quantum Tunneling</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<style>
  :root {
    --bg-main: #0a0e14;
    --bg-panel: #131b26;
    --border: #223247;
    --text-main: #9cb4d4;
    --text-light: #e6f0fa;
    --accent-blue: #3bb2f2;
    --accent-green: #3bf281;
    --accent-orange: #f28a3b;
    --accent-purple: #b86bfc;
  }
  body { margin: 0; padding: 20px; background: #05070a; display: flex; justify-content: center; font-family: system-ui, -apple-system, sans-serif; user-select: none; }
  
  #qt-wrap { 
    background: var(--bg-main); 
    border-radius: 12px; 
    overflow: hidden; 
    border: 1px solid var(--border); 
    box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    width: 100%;
    max-width: 900px;
  }
  
  #qt-header { 
    background: var(--bg-panel); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); 
  }
  
  #qt-header .title { color: var(--text-light); font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 10px; letter-spacing: 0.5px; }
  #qt-header .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent-purple); box-shadow: 0 0 12px var(--accent-purple); animation: pulse 2s infinite; }
  
  @keyframes pulse { 0% { opacity: 0.5; box-shadow: 0 0 5px var(--accent-purple); } 50% { opacity: 1; box-shadow: 0 0 15px var(--accent-purple); } 100% { opacity: 0.5; box-shadow: 0 0 5px var(--accent-purple); } }

  #qt-tabs { display: flex; gap: 8px; background: #0b1017; padding: 4px; border-radius: 8px; border: 1px solid var(--border); }
  .tab-btn { 
    background: transparent; border: none; color: var(--text-main); font-size: 13px; 
    padding: 6px 18px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.2s;
  }
  .tab-btn:hover { color: var(--text-light); }
  .tab-btn.active { background: #1c2a3d; color: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
  
  #qt-canvas { display: block; width: 100%; height: 420px; cursor: crosshair; }
  
  #qt-controls { background: var(--bg-panel); border-top: 1px solid var(--border); padding: 24px; display: flex; flex-wrap: wrap; gap: 24px; }
  
  .control-group { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 150px; }
  .control-label { color: var(--text-main); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; }
  .control-row { display: flex; align-items: center; gap: 12px; background: #0a0e14; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); }
  .control-val { color: var(--text-light); font-size: 14px; font-weight: 700; min-width: 35px; text-align: right; }
  
  input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; height: 4px; background: #1c2a3d; border-radius: 2px; outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--text-light); cursor: pointer; transition: transform 0.1s; }
  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
  
  .left-col { display: flex; flex-direction: column; gap: 16px; flex: 1.2; min-width: 260px; }
  .right-col { display: flex; flex-direction: column; gap: 16px; flex: 2; min-width: 320px; }
  
  #qt-stats { display: flex; gap: 12px; }
  .stat-card { background: #0a0e14; border: 1px solid var(--border); border-radius: 8px; padding: 12px; flex: 1; text-align: center; }
  .stat-val { font-size: 22px; font-weight: 700; font-family: monospace; }
  .stat-lbl { font-size: 10px; color: var(--text-main); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }
  
  .btn-row { display: flex; gap: 12px; }
  .action-btn { padding: 14px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 700; transition: all 0.15s; flex: 1; text-transform: uppercase; letter-spacing: 0.5px; }
  .btn-fire { background: var(--accent-purple); color: #fff; box-shadow: 0 4px 15px rgba(184, 107, 252, 0.3); }
  .btn-fire:hover { filter: brightness(1.1); transform: translateY(-2px); }
  .btn-fire:active { transform: translateY(1px); box-shadow: none; }
  .btn-reset { background: transparent; color: var(--text-main); border: 1px solid var(--border); }
  .btn-reset:hover { background: #1c2a3d; color: #fff; }
</style>
</head>
<body>

<div id="qt-wrap">
  <div id="qt-header">
    <div class="title"><div class="dot"></div>Cinematic Quantum Tunneling</div>
    <div id="qt-tabs">
      <button class="tab-btn active" id="tabQuantum" onclick="setMode('quantum')">Quantum</button>
      <button class="tab-btn" id="tabClassical" onclick="setMode('classical')">Classical</button>
    </div>
  </div>
  <div id="qt-canvas"></div>
  <div id="qt-controls">
    <div class="left-col">
      <div class="btn-row">
        <button class="action-btn btn-fire" id="btnFire">Launch Particle</button>
        <button class="action-btn btn-reset" id="btnReset">Reset</button>
      </div>
      <div id="qt-stats">
        <div class="stat-card">
          <div class="stat-val" id="statT" style="color:var(--accent-green)">--</div>
          <div class="stat-lbl">Transmission</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="statR" style="color:var(--accent-orange)">--</div>
          <div class="stat-lbl">Reflection</div>
        </div>
      </div>
    </div>
    
    <div class="right-col">
      <div style="display:flex; gap: 16px;">
        <div class="control-group">
          <div class="control-label">Particle Energy (E)</div>
          <div class="control-row">
            <input type="range" id="energySlider" min="0.1" max="1.5" value="0.5" step="0.01">
            <span class="control-val" id="energyVal">0.50</span>
          </div>
        </div>
        <div class="control-group">
          <div class="control-label">Barrier Height (V₀)</div>
          <div class="control-row">
            <input type="range" id="heightSlider" min="0.3" max="2.0" value="1.0" step="0.01">
            <span class="control-val" id="heightVal">1.00</span>
          </div>
        </div>
      </div>
      <div style="display:flex; gap: 16px;">
        <div class="control-group">
          <div class="control-label">Barrier Width (a)</div>
          <div class="control-row">
            <input type="range" id="widthSlider" min="0.1" max="3.0" value="0.8" step="0.05">
            <span class="control-val" id="widthVal">0.80</span>
          </div>
        </div>
        <div class="control-group">
          <div class="control-label">Wave Spread (&sigma;)</div>
          <div class="control-row">
            <input type="range" id="spreadSlider" min="0.3" max="1.5" value="0.8" step="0.05">
            <span class="control-val" id="spreadVal">0.80</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let simMode = 'quantum';
function setMode(m) {
  simMode = m;
  document.getElementById('tabQuantum').className = 'tab-btn' + (m==='quantum'?' active':'');
  document.getElementById('tabClassical').className = 'tab-btn' + (m==='classical'?' active':'');
  doReset();
}

new p5(function(p) {
  let W, H;
  const AXIS_Y_FRAC = 0.65;

  let E = 0.5, V0 = 1.0, barrierW = 0.8, spread = 0.8;
  let T = 0, R = 1;

  // Animation State Machine
  // 0: Idle, 1: Approach, 2: Zoom & Pause, 3: Inside Interaction, 4: Zoom Out, 5: Depart
  let phase = 0; 
  let animTimer = 0;
  
  // Camera Variables
  let camX = 0, camY = 0, camScale = 1.0;
  let targetCamX = 0, targetCamY = 0, targetCamScale = 1.0;

  // Physics Objects
  let waves = [];
  let classicalParticle = null;

  function calcT(E_, V0_, a_nm) {
    let a = a_nm * 8; 
    if (E_ === V0_) return 1 / (1 + (2 * 0.038 * V0_ * a * a)); 
    if (E_ > V0_) {
      let k1 = Math.sqrt(E_), k2 = Math.sqrt(E_ - V0_);
      let sinSq = Math.pow(Math.sin(k2 * a), 2);
      return 1 / (1 + (Math.pow(k1*k1 - k2*k2, 2) * sinSq) / (4 * k1*k1 * k2*k2));
    } else {
      let kappa = Math.sqrt(V0_ - E_);
      let sinhSq = Math.pow(Math.sinh(kappa * a), 2);
      return 1 / (1 + (V0_ * V0_ * sinhSq) / (4 * E_ * (V0_ - E_)));
    }
  }

  function doReset() {
    waves = [];
    classicalParticle = null;
    phase = 0;
    animTimer = 0;
    targetCamScale = 1.0;
    targetCamX = 0; targetCamY = 0;
    camScale = 1.0; camX = 0; camY = 0; // Snap camera back instantly
    
    document.getElementById('btnFire').disabled = false;
    document.getElementById('btnFire').style.opacity = 1;
    document.getElementById('btnFire').textContent = "Launch Particle";
  }
  window.doReset = doReset;

  function buildWave(cx, amp, sigma, k0, type) {
    let col;
    if (type === 'transmitted') col = p.color(59, 242, 129); // Green
    else if (type === 'reflected') col = p.color(242, 138, 59); // Orange
    else col = p.color(59, 178, 242); // Blue
    return { cx, amp, sigma, k0, col, type, dead: false };
  }

  p.setup = function() {
    let container = document.getElementById('qt-canvas');
    W = container.offsetWidth;
    H = container.offsetHeight;
    let cnv = p.createCanvas(W, H);
    cnv.parent('qt-canvas');
    
    updateParams();
    
    document.getElementById('btnFire').onclick = () => { 
      if (phase === 0) { 
        phase = 1; 
        let startX = -W * 0.2; // Start offscreen
        let sigma = spread * 40;
        let k0 = Math.sqrt(E) * 3.0;
        
        if (simMode === 'quantum') {
            waves = [buildWave(startX, 1.0, sigma, k0, 'incident')];
        } else {
            classicalParticle = { x: startX, v: 3.0 * Math.sqrt(E), r: 12, squish: 1.0 };
        }
        
        document.getElementById('btnFire').disabled = true;
        document.getElementById('btnFire').style.opacity = 0.5;
        document.getElementById('btnFire').textContent = "In Motion...";
      } 
    };
    document.getElementById('btnReset').onclick = doReset;
    
    ['energy','height','width','spread'].forEach(id => {
      document.getElementById(id+'Slider').oninput = function() {
        updateParams();
        if(phase === 0) doReset(); 
      };
    });
  };

  function updateParams() {
    E = parseFloat(document.getElementById('energySlider').value);
    V0 = parseFloat(document.getElementById('heightSlider').value);
    barrierW = parseFloat(document.getElementById('widthSlider').value);
    spread = parseFloat(document.getElementById('spreadSlider').value);
    
    document.getElementById('energyVal').textContent = E.toFixed(2);
    document.getElementById('heightVal').textContent = V0.toFixed(2);
    document.getElementById('widthVal').textContent = barrierW.toFixed(2);
    document.getElementById('spreadVal').textContent = spread.toFixed(2);
    
    T = calcT(E, V0, barrierW);
    R = 1 - T;
    document.getElementById('statT').textContent = (T * 100).toFixed(1) + '%';
    document.getElementById('statR').textContent = (R * 100).toFixed(1) + '%';
  }

  function getBarrierBounds() {
    let bwPx = p.map(barrierW, 0.1, 3.0, 15, 140);
    let bx1 = W * 0.5 - bwPx / 2;
    let bx2 = W * 0.5 + bwPx / 2;
    return { bx1, bx2, bwPx };
  }

  p.draw = function() {
    p.background(10, 14, 20);
    
    let axisY = H * AXIS_Y_FRAC;
    let { bx1, bx2 } = getBarrierBounds();
    let bMid = (bx1 + bx2) / 2;

    // --- STATE MACHINE & CAMERA LOGIC ---
    let baseSpeed = 3.0 + Math.sqrt(E) * 2.0;

    if (simMode === 'quantum') {
        let mainWave = waves.find(w => w.type === 'incident');
        
        if (phase === 1) { // Following incident wave
            mainWave.cx += baseSpeed;
            targetCamScale = 1.4;
            targetCamX = W * 0.4 - mainWave.cx * targetCamScale;
            targetCamY = H * 0.5 - axisY * targetCamScale + 50;

            // Trigger Zoom In
            if (mainWave.cx >= bx1 - mainWave.sigma * 1.5) {
                phase = 2;
                animTimer = 0;
            }
        } 
        else if (phase === 2) { // Zooming into barrier
            mainWave.cx += baseSpeed * 0.15; // Slow motion
            targetCamScale = 2.4;
            targetCamX = W * 0.5 - bMid * targetCamScale;
            targetCamY = H * 0.5 - axisY * targetCamScale + 80;

            animTimer++;
            if (animTimer > 40) { phase = 3; animTimer = 0; }
        }
        else if (phase === 3) { // Inside interaction (Seeping)
            mainWave.cx += baseSpeed * 0.05; // Extremely slow
            targetCamScale = 2.4; // Hold zoom
            
            animTimer++;
            if (animTimer > 90) { 
                // Execute Split!
                waves.push(buildWave(bx2, Math.sqrt(T), mainWave.sigma, mainWave.k0, 'transmitted'));
                waves.push(buildWave(bx1, Math.sqrt(R), mainWave.sigma, -mainWave.k0, 'reflected'));
                mainWave.dead = true;
                phase = 4; 
                animTimer = 0; 
            }
        }
        else if (phase === 4) { // Zooming out
            targetCamScale = 1.0;
            targetCamX = 0;
            targetCamY = 0;
            
            for (let w of waves) {
                if (w.dead) continue;
                if (w.type === 'transmitted') w.cx += baseSpeed * 0.5;
                if (w.type === 'reflected') w.cx -= baseSpeed * 0.5;
            }

            // Once camera is mostly reset, move to phase 5
            if (Math.abs(camScale - 1.0) < 0.02) phase = 5;
        }
        else if (phase === 5) { // Departing normal speed
            for (let w of waves) {
                if (w.dead) continue;
                if (w.type === 'transmitted') w.cx += baseSpeed;
                if (w.type === 'reflected') w.cx -= baseSpeed;
                
                // Reset condition
                if ((w.type === 'transmitted' && w.cx > W + w.sigma*3) || 
                    (w.type === 'reflected' && w.cx < -w.sigma*3)) {
                    w.dead = true;
                }
            }
            if (waves.every(w => w.dead)) doReset();
        }
    } 
    else {
        // CLASSICAL CAMERA LOGIC
        if (classicalParticle) {
            let cp = classicalParticle;
            let canPass = E >= V0;

            if (phase === 1) { // Approach
                cp.x += cp.v;
                targetCamScale = 1.4;
                targetCamX = W * 0.4 - cp.x * targetCamScale;
                targetCamY = H * 0.5 - axisY * targetCamScale + 50;

                if (cp.x >= bx1 - cp.r * 4) {
                    phase = 2; animTimer = 0;
                }
            }
            else if (phase === 2) { // Zoom to hit
                cp.x += cp.v * 0.2; // slow mo
                targetCamScale = 2.4;
                targetCamX = W * 0.5 - bMid * targetCamScale;
                targetCamY = H * 0.5 - axisY * targetCamScale + 80;

                if (cp.x >= bx1 - cp.r) {
                    cp.x = bx1 - cp.r;
                    phase = 3; animTimer = 0;
                }
            }
            else if (phase === 3) { // Interaction
                animTimer++;
                if (!canPass) {
                    // Compression animation
                    cp.squish = p.map(Math.sin(animTimer * 0.1), 0, 1, 1.0, 0.5);
                } else {
                    // Slowly struggle over
                    cp.x += 0.5;
                }

                if (animTimer > 60) {
                    phase = 4;
                    cp.squish = 1.0;
                    if (!canPass) cp.v = -cp.v; // Bounce back
                }
            }
            else if (phase === 4) { // Zoom out
                targetCamScale = 1.0;
                targetCamX = 0; targetCamY = 0;
                
                if (canPass) {
                    cp.x += 3.0 * Math.sqrt(Math.max(0.01, E - V0)); // Slower inside
                    if (cp.x > bx2 + cp.r) { phase = 5; cp.v = 3.0 * Math.sqrt(E); }
                } else {
                    cp.x += cp.v;
                    if (Math.abs(camScale - 1.0) < 0.02) phase = 5;
                }
            }
            else if (phase === 5) { // Depart
                cp.x += cp.v;
                if (cp.x > W + 50 || cp.x < -50) doReset();
            }
        }
    }

    // Apply Camera Lerping
    camScale = p.lerp(camScale, targetCamScale, 0.06);
    camX = p.lerp(camX, targetCamX, 0.06);
    camY = p.lerp(camY, targetCamY, 0.06);

    p.push();
    p.translate(camX, camY);
    p.scale(camScale);

    // --- DRAW ENVIRONMENT ---
    drawEnvironment(axisY, bx1, bx2);

    // --- DRAW SCENE ---
    if (simMode === 'quantum') {
        // Draw the Interaction Seep (Phase 2 & 3)
        if ((phase === 2 || phase === 3) && waves.length > 0) {
            drawEvanescentSeep(axisY, bx1, bx2);
        }

        for (let w of waves) {
            if (!w.dead) drawWaveEnvelope(w, axisY);
        }
    } else {
        drawClassicalParticle(axisY);
    }

    p.pop(); // End Camera Transform

    // Fixed UI Overlays (Not affected by camera zoom)
    if (phase !== 0) {
        drawPhaseIndicator();
    }
  };

  function drawEnvironment(axisY, bx1, bx2) {
    let potH = p.map(V0, 0.3, 2.0, 20, 110);
    
    // Grid Lines (Scaled)
    p.stroke(20, 30, 45);
    p.strokeWeight(1 / camScale);
    for (let x = -W; x < W*2; x += 50) p.line(x, -H, x, H*2);

    // The Barrier Box
    p.noStroke();
    let fillGrad = p.drawingContext.createLinearGradient(0, axisY - potH, 0, axisY);
    fillGrad.addColorStop(0, 'rgba(59, 178, 242, 0.2)');
    fillGrad.addColorStop(1, 'rgba(59, 178, 242, 0.05)');
    p.drawingContext.fillStyle = fillGrad;
    p.rect(bx1, axisY - potH, bx2 - bx1, potH);

    // Barrier Edges
    p.stroke(59, 178, 242, 200);
    p.strokeWeight(2 / camScale);
    p.line(bx1, axisY, bx1, axisY - potH);
    p.line(bx2, axisY, bx2, axisY - potH);
    p.line(bx1, axisY - potH, bx2, axisY - potH);

    // Ground line
    p.stroke(50, 70, 90);
    p.strokeWeight(2 / camScale);
    p.line(-W, axisY, W*2, axisY);

    // Energy Level Line
    let ey = axisY - p.map(E, 0, Math.max(V0, 0.01), 0, potH);
    p.stroke(E >= V0 ? '#3bf281' : '#f28a3b');
    p.strokeWeight(1.5 / camScale);
    p.drawingContext.setLineDash([5 / camScale, 5 / camScale]);
    p.line(-W, ey, W*2, ey);
    p.drawingContext.setLineDash([]);
  }

  function drawWaveEnvelope(wp, axisY) {
    let pts = [];
    let drawScale = 55; 

    for (let px = wp.cx - wp.sigma*3; px <= wp.cx + wp.sigma*3; px += 1.5) {
      let dx = px - wp.cx;
      let gaussian = Math.exp(-(dx * dx) / (2 * wp.sigma * wp.sigma));
      // Just drawing the probability density envelope for visual clarity
      let density = wp.amp * wp.amp * gaussian * gaussian; 
      pts.push({ x: px, y: axisY - density * drawScale });
    }

    let c = wp.col;

    // Fill
    p.noStroke();
    p.fill(p.red(c), p.green(c), p.blue(c), 40);
    p.beginShape();
    p.vertex(pts[0].x, axisY);
    for (let pt of pts) p.vertex(pt.x, pt.y);
    p.vertex(pts[pts.length-1].x, axisY);
    p.endShape();
    
    // Line
    p.stroke(c);
    p.strokeWeight(2.5 / camScale);
    p.noFill();
    p.beginShape();
    for (let pt of pts) p.vertex(pt.x, pt.y);
    p.endShape();
  }

  function drawEvanescentSeep(axisY, bx1, bx2) {
    // This function creates the localized animation inside the barrier during the pause
    let progress = p.map(animTimer, 0, 90, 0, 1, true); 
    if (phase === 2) progress = 0.1; // Just starting to seep in phase 2

    let currentSeepX = bx1 + (bx2 - bx1) * progress;

    p.noFill();
    p.stroke(184, 107, 252, 200); // Purple interaction color
    p.strokeWeight(2 / camScale);
    
    // Glow effect
    p.drawingContext.shadowBlur = 10 * camScale;
    p.drawingContext.shadowColor = 'rgba(184, 107, 252, 1)';
    
    p.beginShape();
    for (let px = bx1; px <= currentSeepX; px += 1) {
        let x = px - bx1;
        let val = 0;
        
        // Fast oscillation to represent high energy frequency interaction
        let freq = p.frameCount * 0.3;
        
        if (E < V0) {
            // Exponential decay
            let kappa = Math.sqrt(V0 - E) * 0.12;
            val = Math.exp(-kappa * x) * Math.cos(freq - x*0.2);
        } else {
            // Oscillating through
            let k2 = Math.sqrt(E - V0) * 0.1;
            val = Math.cos(k2 * x - freq);
        }
        
        // Match the transmitted amplitude envelope at the right edge visually
        let envelope = p.map(px, bx1, bx2, 1.0, Math.sqrt(T));
        
        // Fade in the leading edge of the seep
        let edgeFade = p.map(px, currentSeepX - 10, currentSeepX, 1, 0, true);
        
        p.vertex(px, axisY - (Math.abs(val) * envelope * 55 * edgeFade));
    }
    p.endShape();
    p.drawingContext.shadowBlur = 0; // reset
  }

  function drawClassicalParticle(axisY) {
    if (!classicalParticle) return;
    let cp = classicalParticle;
    let by = axisY - cp.r;

    p.push();
    p.translate(cp.x, by);
    
    // Scale for squish effect on reflection
    if (cp.squish !== 1.0) {
        // Squish origin is at the right edge (hitting the wall)
        p.translate(cp.r, 0);
        p.scale(cp.squish, 2 - cp.squish); // Conservation of area
        p.translate(-cp.r, 0);
    }

    let cColor = E >= V0 ? p.color(59, 242, 129) : p.color(242, 138, 59);
    
    p.noStroke();
    p.fill(p.red(cColor), p.green(cColor), p.blue(cColor), 60);
    p.circle(0, 0, cp.r * 2.8);
    
    p.fill(cColor);
    p.circle(0, 0, cp.r * 2);
    
    p.fill(255, 255, 255, 180);
    p.circle(-cp.r*0.3, -cp.r*0.3, cp.r*0.5);
    
    p.pop();
  }

  function drawPhaseIndicator() {
    p.fill(255);
    p.noStroke();
    p.textSize(12);
    p.textAlign(p.CENTER);
    
    let textStr = "";
    if (phase === 1) textStr = "Tracking Incident Packet...";
    else if (phase === 2) textStr = "Approaching Barrier Boundary...";
    else if (phase === 3) {
        if (simMode === 'quantum') textStr = "Wave Function Penetrating & Splitting...";
        else textStr = E >= V0 ? "Surmounting Potential Barrier..." : "Reflecting from Barrier...";
    }
    else if (phase === 4 || phase === 5) textStr = "Macro View Restored";

    p.text(textStr, W/2, 30);
  }

}, document.getElementById('qt-canvas'));
</script>
