<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinematic Quantum Tunneling - Superposition & Disruption</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<style>
  :root {
    --bg-main: #06090e;
    --bg-panel: #0d131c;
    --border: #1a2636;
    --text-main: #7a93b3;
    --text-light: #dce6f2;
    --accent-blue: #2eb6ff;
    --accent-green: #2eff84;
    --accent-orange: #ff842e;
    --accent-purple: #c47aff;
  }
  body { margin: 0; padding: 20px; background: #030406; display: flex; justify-content: center; font-family: system-ui, -apple-system, sans-serif; user-select: none; }
  
  #qt-wrap { 
    background: var(--bg-main); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); 
    box-shadow: 0 25px 60px rgba(0,0,0,0.9); width: 100%; max-width: 900px;
  }
  
  #qt-header { background: var(--bg-panel); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  #qt-header .title { color: var(--text-light); font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 10px; letter-spacing: 0.5px; }
  #qt-header .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent-purple); box-shadow: 0 0 12px var(--accent-purple); animation: pulse 2s infinite; }
  @keyframes pulse { 0% { opacity: 0.5; box-shadow: 0 0 5px var(--accent-purple); } 50% { opacity: 1; box-shadow: 0 0 15px var(--accent-purple); } 100% { opacity: 0.5; box-shadow: 0 0 5px var(--accent-purple); } }

  .version-tag { color: #a5b9ce; font-size: 12px; font-family: monospace; font-weight: bold; background: #162130; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); }

  #qt-tabs { display: flex; gap: 8px; background: #080c12; padding: 4px; border-radius: 8px; border: 1px solid var(--border); }
  .tab-btn { background: transparent; border: none; color: var(--text-main); font-size: 13px; padding: 6px 18px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
  .tab-btn:hover { color: var(--text-light); }
  .tab-btn.active { background: #1a283b; color: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
  
  #qt-canvas { display: block; width: 100%; height: 440px; cursor: crosshair; position: relative; }
  
  #qt-controls { background: var(--bg-panel); border-top: 1px solid var(--border); padding: 24px; display: flex; flex-wrap: wrap; gap: 24px; }
  .control-group { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 150px; }
  .control-label { color: var(--text-main); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; }
  .control-row { display: flex; align-items: center; gap: 12px; background: #06090e; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); }
  .control-val { color: var(--text-light); font-size: 14px; font-weight: 700; min-width: 35px; text-align: right; font-variant-numeric: tabular-nums; }
  
  input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; height: 4px; background: #1a283b; border-radius: 2px; outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--text-light); cursor: pointer; transition: transform 0.1s; }
  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
  
  .left-col { display: flex; flex-direction: column; gap: 16px; flex: 1.2; min-width: 260px; }
  .right-col { display: flex; flex-direction: column; gap: 16px; flex: 2; min-width: 320px; }
  
  #qt-stats { display: flex; gap: 12px; }
  .stat-card { background: #06090e; border: 1px solid var(--border); border-radius: 8px; padding: 12px; flex: 1; text-align: center; }
  .stat-val { font-size: 22px; font-weight: 700; font-family: monospace; }
  .stat-lbl { font-size: 10px; color: var(--text-main); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }
  
  .btn-row { display: flex; gap: 12px; }
  .action-btn { padding: 14px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 700; transition: all 0.15s; flex: 1; text-transform: uppercase; letter-spacing: 0.5px; }
  .btn-fire { background: var(--accent-purple); color: #fff; box-shadow: 0 4px 15px rgba(196, 122, 255, 0.3); }
  .btn-fire:hover { filter: brightness(1.1); transform: translateY(-2px); }
  .btn-fire:active { transform: translateY(1px); box-shadow: none; }
  .btn-reset { background: transparent; color: var(--text-main); border: 1px solid var(--border); }
  .btn-reset:hover { background: #1a283b; color: #fff; }
</style>
</head>
<body>

<div id="qt-wrap">
  <div id="qt-header">
    <div class="title"><div class="dot"></div>Cinematic Quantum Tunneling</div>
    <div style="display:flex; align-items:center; gap: 15px;">
      <div class="version-tag">v2026.04.10 11:06 PDT</div>
      <div id="qt-tabs">
        <button class="tab-btn active" id="tabQuantum" onclick="setMode('quantum')">Quantum</button>
        <button class="tab-btn" id="tabClassical" onclick="setMode('classical')">Classical</button>
      </div>
    </div>
  </div>
  <div id="qt-canvas">
      <div id="loading-msg" style="color:#7a93b3; padding: 20px; text-align: center; font-family: monospace;">
          Initializing Simulation Graphics...
      </div>
  </div>
  <div id="qt-controls">
    <div class="left-col">
      <div class="btn-row">
        <button class="action-btn btn-fire" id="btnFire">Launch Particle</button>
        <button class="action-btn btn-reset" id="btnReset">Reset</button>
      </div>
      <div id="qt-stats">
        <div class="stat-card">
          <div class="stat-val" id="statT" style="color:var(--accent-green)">--</div>
          <div class="stat-lbl">Transmission</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="statR" style="color:var(--accent-orange)">--</div>
          <div class="stat-lbl">Reflection</div>
        </div>
      </div>
    </div>
    
    <div class="right-col">
      <div style="display:flex; gap: 16px;">
        <div class="control-group">
          <div class="control-label">Particle Energy (E)</div>
          <div class="control-row">
            <input type="range" id="energySlider" min="0.1" max="1.5" value="0.5" step="0.01">
            <span class="control-val" id="energyVal">0.50</span>
          </div>
        </div>
        <div class="control-group">
          <div class="control-label">Barrier Height (V₀)</div>
          <div class="control-row">
            <input type="range" id="heightSlider" min="0.3" max="2.0" value="1.0" step="0.01">
            <span class="control-val" id="heightVal">1.00</span>
          </div>
        </div>
      </div>
      <div style="display:flex; gap: 16px;">
        <div class="control-group">
          <div class="control-label">Barrier Width (a)</div>
          <div class="control-row">
            <input type="range" id="widthSlider" min="0.1" max="3.0" value="0.8" step="0.05">
            <span class="control-val" id="widthVal">0.80</span>
          </div>
        </div>
        <div class="control-group">
          <div class="control-label">Wave Spread (&sigma;)</div>
          <div class="control-row">
            <input type="range" id="spreadSlider" min="0.3" max="1.5" value="0.8" step="0.05">
            <span class="control-val" id="spreadVal">0.80</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
window.onload = function() {
    let loader = document.getElementById('loading-msg');
    if (typeof p5 === 'undefined') {
        if(loader) loader.innerHTML = "<span style='color:#ff5555; font-size:14px;'><b>CRITICAL ERROR:</b> p5.js Library Failed to Load. Check internet connection.</span>";
    } else {
        if(loader) loader.style.display = 'none';
    }
};

let simMode = 'quantum';
function setMode(m) {
  simMode = m;
  document.getElementById('tabQuantum').className = 'tab-btn' + (m==='quantum'?' active':'');
  document.getElementById('tabClassical').className = 'tab-btn' + (m==='classical'?' active':'');
  if (typeof window.doReset === 'function') window.doReset();
}

new p5(function(p) {
  let W = 800, H = 440;
  const AXIS_Y_FRAC = 0.65;

  let E = 0.5, V0 = 1.0, barrierW = 0.8, spread = 0.8;
  let T = 0, R = 1;

  let phase = 0; 
  let animTimer = 0;
  
  let camX = 0, camY = 0, camScale = 1.0;
  let targetCamX = 0, targetCamY = 0, targetCamScale = 1.0;

  let waves = [];
  let sparks = []; 
  let classicalParticle = null;

  // Pure arrays for memory safety
  const COL_TRANS = [46, 255, 132];
  const COL_REFL  = [255, 132, 46];
  const COL_INC   = [46, 182, 255];
  const COL_SUPER = [196, 122, 255]; // Purple for superposition disruption

  function calcT(E_, V0_, a_nm) {
    let a = a_nm * 8; 
    if (Math.abs(E_ - V0_) < 0.005) {
      return 1 / (1 + (2 * 0.038 * V0_ * a * a)); 
    }
    if (E_ > V0_) {
      let k1 = Math.sqrt(E_), k2 = Math.sqrt(Math.max(0.0001, E_ - V0_));
      let sinSq = Math.pow(Math.sin(k2 * a), 2);
      return 1 / (1 + (Math.pow(k1*k1 - k2*k2, 2) * sinSq) / (4 * k1*k1 * k2*k2));
    } else {
      let kappa = Math.sqrt(Math.max(0.0001, V0_ - E_));
      let sinhSq = Math.pow(Math.sinh(kappa * a), 2);
      return 1 / (1 + (V0_ * V0_ * sinhSq) / (4 * E_ * (V0_ - E_)));
    }
  }

  function doReset() {
    waves = []; sparks = []; classicalParticle = null;
    phase = 0; animTimer = 0;
    targetCamScale = 1.0; targetCamX = 0; targetCamY = 0;
    camScale = 1.0; camX = 0; camY = 0; 
    
    let btn = document.getElementById('btnFire');
    if (btn) {
        btn.disabled = false;
        btn.style.opacity = 1;
        btn.textContent = "Launch Particle";
    }
  }
  window.doReset = doReset;

  function buildWave(cx, amp, sigma, k0, type) {
    let col = type === 'transmitted' ? COL_TRANS : type === 'reflected' ? COL_REFL : COL_INC;
    return { cx, amp, sigma, k0, col, type, dead: false };
  }

  p.setup = function() {
    try {
        let container = document.getElementById('qt-canvas');
        if (container) {
            W = container.offsetWidth > 0 ? container.offsetWidth : 800;
            H = container.offsetHeight > 0 ? container.offsetHeight : 440;
        }
        let cnv = p.createCanvas(W, H);
        cnv.parent('qt-canvas');
        
        updateParams();
        
        document.getElementById('btnFire').onclick = () => { 
          if (phase === 0) { 
            phase = 1; 
            let startX = -W * 0.2; 
            let sigma = spread * 40;
            let k0 = Math.sqrt(E) * 3.0;
            
            if (simMode === 'quantum') waves = [buildWave(startX, 1.0, sigma, k0, 'incident')];
            else classicalParticle = { x: startX, v: 3.0 * Math.sqrt(E), r: 12, squish: 1.0 };
            
            document.getElementById('btnFire').disabled = true;
            document.getElementById('btnFire').style.opacity = 0.5;
            document.getElementById('btnFire').textContent = "In Motion...";
          } 
        };
        document.getElementById('btnReset').onclick = doReset;
        
        ['energy','height','width','spread'].forEach(id => {
          document.getElementById(id+'Slider').oninput = function() {
            updateParams();
            if(phase === 0) doReset(); 
          };
        });
    } catch (e) {
        let container = document.getElementById('qt-canvas');
        if (container) container.innerHTML = `<div style='color:red; padding:20px;'>Setup Crash: ${e.message}</div>`;
    }
  };

  function updateParams() {
    let eSl = document.getElementById('energySlider');
    let hSl = document.getElementById('heightSlider');
    let wSl = document.getElementById('widthSlider');
    let sSl = document.getElementById('spreadSlider');

    if (eSl) E = parseFloat(eSl.value) || 0.5;
    if (hSl) V0 = parseFloat(hSl.value) || 1.0;
    if (wSl) barrierW = parseFloat(wSl.value) || 0.8;
    if (sSl) spread = parseFloat(sSl.value) || 0.8;
    
    document.getElementById('energyVal').textContent = E.toFixed(2);
    document.getElementById('heightVal').textContent = V0.toFixed(2);
    document.getElementById('widthVal').textContent = barrierW.toFixed(2);
    document.getElementById('spreadVal').textContent = spread.toFixed(2);
    
    T = calcT(E, V0, barrierW);
    if (isNaN(T) || !isFinite(T)) T = 0; 
    R = 1 - T;
    
    document.getElementById('statT').textContent = (T * 100).toFixed(1) + '%';
    document.getElementById('statR').textContent = (R * 100).toFixed(1) + '%';
  }

  p.draw = function() {
    try {
        p.background(10, 15, 22); 
        
        let axisY = H * AXIS_Y_FRAC;
        let bwPx = 20 + ((barrierW - 0.1) / 2.9) * 130; 
        let bx1 = W * 0.5 - bwPx / 2;
        let bx2 = W * 0.5 + bwPx / 2;
        let bMid = (bx1 + bx2) / 2;
        let baseSpeed = 3.0 + Math.sqrt(E) * 2.0;

        // --- STATE MACHINE ---
        if (simMode === 'quantum') {
            let mainWave = waves.find(w => w.type === 'incident');
            
            if (phase === 1 && mainWave) { 
                mainWave.cx += baseSpeed;
                targetCamScale = 1.3;
                targetCamX = W * 0.4 - mainWave.cx * targetCamScale;
                targetCamY = H * 0.5 - axisY * targetCamScale + 50;
                // Transition right before it touches the wall
                if (mainWave.cx >= bx1 - mainWave.sigma * 2.0) { phase = 2; animTimer = 0; }
            } 
            else if (phase === 2 && mainWave) { 
                mainWave.cx += baseSpeed * 0.1; // extreme slow motion
                targetCamScale = 1.9; // Wide enough to see the interference left and emergence right
                targetCamX = W * 0.5 - bMid * targetCamScale;
                targetCamY = H * 0.5 - axisY * targetCamScale + 80;
                animTimer++;
                // Enter Disruption Phase
                if (animTimer > 40) { phase = 3; animTimer = 0; }
            }
            else if (phase === 3 && mainWave) { 
                animTimer++;
                // We hold phase 3 for 250 frames to watch the superposition push left and tunnel right
                if (animTimer > 250) { 
                    waves.push(buildWave(bx2, Math.sqrt(Math.max(0, T)), mainWave.sigma, mainWave.k0, 'transmitted'));
                    waves.push(buildWave(bx1, Math.sqrt(Math.max(0, R)), mainWave.sigma, -mainWave.k0, 'reflected'));
                    mainWave.dead = true;
                    phase = 4; animTimer = 0;
                }
            }
            else if (phase === 4) { 
                targetCamScale = 1.0; targetCamX = 0; targetCamY = 0;
                for (let w of waves) {
                    if (w.dead) continue;
                    if (w.type === 'transmitted') w.cx += baseSpeed * 0.5;
                    if (w.type === 'reflected') w.cx -= baseSpeed * 0.5;
                }
                if (Math.abs(camScale - 1.0) < 0.02) phase = 5;
            }
            else if (phase === 5) { 
                for (let w of waves) {
                    if (w.dead) continue;
                    if (w.type === 'transmitted') w.cx += baseSpeed;
                    if (w.type === 'reflected') w.cx -= baseSpeed;
                    if ((w.type === 'transmitted' && w.cx > W + w.sigma*3) || 
                        (w.type === 'reflected' && w.cx < -w.sigma*3)) { w.dead = true; }
                }
                if (waves.every(w => w.dead)) doReset();
            }
        } 
        else {
            // Classical stays the same
            if (classicalParticle) {
                let cp = classicalParticle;
                let canPass = E >= V0;

                if (phase === 1) { 
                    cp.x += cp.v;
                    targetCamScale = 1.3;
                    targetCamX = W * 0.4 - cp.x * targetCamScale;
                    targetCamY = H * 0.5 - axisY * targetCamScale + 50;
                    if (cp.x >= bx1 - cp.r * 4) { phase = 2; animTimer = 0; }
                }
                else if (phase === 2) { 
                    cp.x += cp.v * 0.2; 
                    targetCamScale = 1.9;
                    targetCamX = W * 0.5 - bMid * targetCamScale;
                    targetCamY = H * 0.5 - axisY * targetCamScale + 80;
                    if (cp.x >= bx1 - cp.r) {
                        cp.x = bx1 - cp.r;
                        phase = 3; animTimer = 0;
                        if (!canPass) {
                            for(let i=0; i<15; i++) sparks.push({ x: bx1, y: axisY-cp.r + p.random(-10,10), vx: p.random(-3, -0.5), vy: p.random(-2, 2), life: 255 });
                        }
                    }
                }
                else if (phase === 3) { 
                    animTimer++;
                    if (!canPass) {
                        cp.squish = 1.0 - ((Math.sin(animTimer * 0.1) + 1) / 2) * 0.5;
                    } else {
                        cp.x += 0.5; 
                    }
                    if (animTimer > 60) {
                        phase = 4; cp.squish = 1.0;
                        if (!canPass) cp.v = -cp.v; 
                    }
                }
                else if (phase === 4) { 
                    targetCamScale = 1.0; targetCamX = 0; targetCamY = 0;
                    if (canPass) {
                        cp.x += 3.0 * Math.sqrt(Math.max(0.01, E - V0)); 
                        if (cp.x > bx2 + cp.r) { phase = 5; cp.v = 3.0 * Math.sqrt(E); }
                    } else {
                        cp.x += cp.v;
                        if (Math.abs(camScale - 1.0) < 0.02) phase = 5;
                    }
                }
                else if (phase === 5) { 
                    cp.x += cp.v;
                    if (cp.x > W + 50 || cp.x < -50) doReset();
                }
            }
        }

        // --- MATH SAFE LERP ---
        camScale += (targetCamScale - camScale) * 0.08;
        if (isNaN(camScale)) camScale = 1.0; 
        camScale = Math.max(0.1, Math.min(camScale, 4.0)); 
        
        camX += (targetCamX - camX) * 0.08;
        if (isNaN(camX)) camX = 0;
        
        camY += (targetCamY - camY) * 0.08;
        if (isNaN(camY)) camY = 0;

        // --- RENDER MATRIX ---
        p.push();
        p.translate(camX, camY);
        p.scale(camScale);

        drawEnvironment(axisY, bx1, bx2);

        if (simMode === 'quantum') {
            if (phase === 3) {
                let mw = waves.find(w => w.type === 'incident');
                if (mw) drawSuperpositionAndTunneling(axisY, bx1, bx2, mw);
            } else {
                for (let w of waves) { if (!w.dead) drawWaveEnvelope(w, axisY); }
            }
        } else {
            drawClassicalParticle(axisY);
            updateAndDrawSparks();
        }

        p.pop();

        if (phase !== 0) drawPhaseIndicator();

    } catch (err) {
        // GLOBAL RED SCREEN FAILSAFE
        p.resetMatrix();
        p.background(100, 0, 0);
        p.fill(255); p.noStroke(); p.textSize(14); p.textAlign(p.LEFT);
        p.text("Crash Prevented. Error in render loop:", 20, 30);
        p.text(err.message, 20, 60);
        p.noLoop(); 
    }
  };

  // --- THE NEW SUPERPOSITION / DISRUPTION RENDERER ---
  function drawSuperpositionAndTunneling(axisY, bx1, bx2, mainWave) {
      // t goes from 0.0 to 1.0 during the interaction
      let t = Math.min(1.0, animTimer / 250.0);
      
      let k = Math.sqrt(E) * 0.15;
      let phase_time = p.frameCount * 0.15;
      
      // Calculate how far the packets travel during interaction
      let travelDist = mainWave.sigma * 4; 
      
      // The incident wave keeps moving right
      let cx_in = bx1 - mainWave.sigma + (travelDist * t);
      
      // The reflected wave originates from the wall and moves left
      // It starts deep right and travels left, only visibly emerging as t increases
      let cx_ref = bx1 + mainWave.sigma - (travelDist * t);
      
      // The transmitted wave originates from the right wall and moves right
      let cx_tr = bx2 - mainWave.sigma + (travelDist * Math.max(0, t - 0.2)); 

      let amp_ref = Math.sqrt(Math.max(0, R));
      let amp_tr = Math.sqrt(Math.max(0, T));
      let decay = E < V0 ? Math.sqrt(Math.max(0.0001, V0 - E)) * 0.08 : 0;
      let k_barrier = E >= V0 ? Math.sqrt(Math.max(0.0001, E - V0)) * 0.15 : 0;

      // Draw the Probability Density (The Fill)
      p.noStroke();
      p.beginShape();
      p.vertex(bx1 - mainWave.sigma * 4, axisY);
      for (let px = bx1 - mainWave.sigma * 4; px <= bx2 + mainWave.sigma * 4; px += 2.5) {
          let val = calculateWaveAmplitude(px, bx1, bx2, cx_in, cx_ref, cx_tr, k, phase_time, amp_ref, amp_tr, decay, k_barrier, t, mainWave.sigma);
          
          // Determine color blending based on region
          let c = COL_INC;
          if (px > bx2) c = COL_TRANS;
          else if (px > bx1 && px <= bx2) c = E < V0 ? COL_SUPER : COL_TRANS;
          else if (t > 0.3) c = p.lerpColor(p.color(COL_INC), p.color(COL_SUPER), t); // Morph to purple on left
          
          p.fill(c.levels ? c.levels[0] : c[0], c.levels ? c.levels[1] : c[1], c.levels ? c.levels[2] : c[2], 40);
          p.vertex(px, axisY - (val * val * 55)); // Probability density is amplitude squared
      }
      p.vertex(bx2 + mainWave.sigma * 4, axisY);
      p.endShape();

      // Draw the Real Wave Function (The Line)
      p.noFill();
      p.strokeWeight(2.5 / camScale);
      p.beginShape();
      for (let px = bx1 - mainWave.sigma * 4; px <= bx2 + mainWave.sigma * 4; px += 2) {
          let val = calculateWaveAmplitude(px, bx1, bx2, cx_in, cx_ref, cx_tr, k, phase_time, amp_ref, amp_tr, decay, k_barrier, t, mainWave.sigma);
          
          let c = COL_INC;
          if (px > bx2) c = COL_TRANS;
          else if (px > bx1 && px <= bx2) c = E < V0 ? COL_SUPER : COL_TRANS;
          else if (t > 0.3) c = p.lerpColor(p.color(COL_INC), p.color(COL_SUPER), t);
          
          p.stroke(c.levels ? c.levels[0] : c[0], c.levels ? c.levels[1] : c[1], c.levels ? c.levels[2] : c[2], 255);
          p.vertex(px, axisY - (val * 45));
      }
      p.endShape();
  }

  // Math helper for the complex superposition at any point x
  function calculateWaveAmplitude(px, bx1, bx2, cx_in, cx_ref, cx_tr, k, phase_time, amp_ref, amp_tr, decay, k_barrier, t, sigma) {
      let sigSq = Math.max(0.001, sigma * sigma);
      
      if (px <= bx1) {
          // Region 1: Superposition of Incident and Reflected (Creates the Disruption)
          let env_in = Math.exp(-Math.pow(px - cx_in, 2) / (2 * sigSq));
          let wave_in = env_in * Math.cos(k * (px - bx1) - phase_time);
          
          let env_ref = Math.exp(-Math.pow(px - cx_ref, 2) / (2 * sigSq));
          // Reflected wave shifts phase and travels opposite direction
          let wave_ref = amp_ref * env_ref * Math.cos(-k * (px - bx1) - phase_time);
          
          return wave_in + wave_ref;
      } 
      else if (px > bx1 && px <= bx2) {
          // Region 2: Inside Barrier
          let x_bar = px - bx1;
          let penetration_progress = Math.min(1.0, t * 1.5);
          
          if (E < V0) {
              // Tunneling: Exponential decay
              let env = Math.exp(-decay * x_bar);
              // Boundary match at x=0
              let val = Math.cos(-phase_time) * env * penetration_progress;
              // Smooth out the leading edge as it pushes through
              let front = bx1 + (bx2 - bx1) * t * 1.2;
              if (px > front) val *= Math.max(0, 1.0 - (px - front) / 10.0);
              // Match right boundary amplitude
              val *= p.map(px, bx1, bx2, 1.0, amp_tr, true);
              return val;
          } else {
              // Above Barrier: Oscillating but different wavelength
              let val = Math.cos(k_barrier * x_bar - phase_time) * penetration_progress;
              val *= p.map(px, bx1, bx2, 1.0, amp_tr, true);
              return val;
          }
      } 
      else {
          // Region 3: Transmitted Wave
          let env_tr = Math.exp(-Math.pow(px - cx_tr, 2) / (2 * sigSq));
          // Only start showing transmitted wave after it has had time to tunnel
          let emerge_ramp = Math.max(0, Math.min(1.0, (t - 0.2) * 2.0));
          return amp_tr * env_tr * emerge_ramp * Math.cos(k * (px - bx2) - phase_time);
      }
  }

  function drawEnvironment(axisY, bx1, bx2) {
    let potH = 20 + ((V0 - 0.3) / 1.7) * 90; 
    
    p.stroke(25, 35, 50); p.strokeWeight(1 / camScale);
    for (let x = -W; x < W*2; x += 40) p.line(x, -H, x, H*2);
    for (let y = -H; y < H*2; y += 40) p.line(-W, y, W*2, y);

    p.noStroke();
    p.fill(46, 182, 255, 25); p.rect(bx1, axisY - potH, bx2 - bx1, potH);
    p.fill(46, 182, 255, 40); p.rect(bx1, axisY - potH * 0.3, bx2 - bx1, potH * 0.3);

    p.stroke(46, 182, 255, 150); p.strokeWeight(2 / camScale);
    p.line(bx1, axisY, bx1, axisY - potH); p.line(bx2, axisY, bx2, axisY - potH); p.line(bx1, axisY - potH, bx2, axisY - potH);

    p.stroke(50, 70, 90); p.strokeWeight(2 / camScale);
    p.line(-W, axisY, W*2, axisY);

    let ey = axisY - (E / Math.max(V0, 0.01)) * potH;
    let ec = E >= V0 ? COL_TRANS : COL_REFL;
    p.stroke(ec[0], ec[1], ec[2], 180); p.strokeWeight(1.5 / camScale);
    p.line(-W, ey, W*2, ey);
  }

  function drawWaveEnvelope(wp, axisY) {
    let pts = []; let drawScale = 55; 
    for (let px = wp.cx - wp.sigma*3; px <= wp.cx + wp.sigma*3; px += 1.5) {
      let dx = px - wp.cx;
      let sigSq = Math.max(0.001, wp.sigma * wp.sigma);
      let gaussian = Math.exp(-(dx * dx) / (2 * sigSq));
      // Just showing standard packet envelope for phase 1 & 4
      pts.push({ x: px, y: axisY - (wp.amp * wp.amp * gaussian * gaussian * drawScale) });
    }
    if (pts.length > 0) {
        let c = wp.col;
        p.noStroke(); p.fill(c[0], c[1], c[2], 40);
        p.beginShape(); p.vertex(pts[0].x, axisY);
        for (let pt of pts) p.vertex(pt.x, pt.y);
        p.vertex(pts[pts.length-1].x, axisY); p.endShape();
        
        p.stroke(c[0], c[1], c[2], 255); p.strokeWeight(2.5 / camScale); p.noFill();
        p.beginShape(); for (let pt of pts) p.vertex(pt.x, pt.y); p.endShape();
    }
  }

  function drawClassicalParticle(axisY) {
    if (!classicalParticle) return;
    let cp = classicalParticle; let by = axisY - cp.r;
    
    p.push(); p.translate(cp.x, by);
    if (phase === 3 && E >= V0) {
        p.noStroke(); p.fill(46, 255, 132, 20);
        p.circle(-cp.r, 0, cp.r*5); p.circle(-cp.r*2, 0, cp.r*3);
    }
    if (cp.squish !== 1.0) { p.translate(cp.r, 0); p.scale(cp.squish, 2 - cp.squish); p.translate(-cp.r, 0); }

    let c = E >= V0 ? COL_TRANS : COL_REFL;
    p.noStroke();
    p.fill(c[0], c[1], c[2], 60); p.circle(0, 0, cp.r * 2.8);
    p.fill(c[0], c[1], c[2], 255); p.circle(0, 0, cp.r * 2);
    p.fill(255, 255, 255, 180); p.circle(-cp.r*0.3, -cp.r*0.3, cp.r*0.5);
    p.pop();
  }

  function updateAndDrawSparks() {
      for(let i = sparks.length - 1; i >= 0; i--) {
          let s = sparks[i]; s.x += s.vx; s.y += s.vy; s.life -= 15;
          p.stroke(255, 132, 46, Math.max(0, s.life)); p.strokeWeight(2 / camScale);
          p.line(s.x, s.y, s.x - s.vx*2, s.y - s.vy*2);
          if (s.life <= 0) sparks.splice(i, 1);
      }
  }

  function drawPhaseIndicator() {
    p.fill(255); p.noStroke(); p.textSize(12); p.textAlign(p.CENTER);
    let textStr = phase === 1 ? "Tracking Incident Packet..." : 
                  phase === 2 ? "Approaching Barrier Boundary..." : 
                  phase === 3 ? (simMode === 'quantum' ? "Superposition Disruption & Evanescent Penetration..." : (E >= V0 ? "Surmounting Potential Barrier (Slowing Down)" : "Kinetic Impact & Hard Reflection")) : 
                  "Macro View Restored";
    p.text(textStr, W/2, 30);
  }

}, document.getElementById('qt-canvas'));
</script>
